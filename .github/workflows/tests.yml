name: C++/Python CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        # This installs pybind11 on the GitHub Runner's OS
        run: pip install pybind11 pytest 

      - name: Configure CMake
        # DO NOT use -Dpybind11_DIR here. 
        # Since we installed via pip, CMake will find it if your CMakeLists.txt is correct.
        run: |
          mkdir build
          cd build
          cmake .. 

      - name: Build and Run Tests
        run: |
          cd build
          make
          pytest ../tests/test_api.py
